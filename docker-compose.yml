services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: citypulse
      POSTGRES_PASSWORD: citypulse # local-only credential
      POSTGRES_DB: citypulse
    ports: ["5433:5432"] # host 5433 to avoid clashing with a locally installed Postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citypulse"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://citypulse:citypulse@postgres:5432/citypulse
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    volumes:
      - ./secrets:/app/secrets:ro # dev-only read-only SA key mount
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/v1
        NEXT_PUBLIC_WS_URL: ws://localhost:8000/v1/ws
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
    ports: ["3000:3000"]
    depends_on: [backend]
    restart: unless-stopped

volumes:
  pgdata:
